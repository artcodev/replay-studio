server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 260m;
  client_body_timeout 300s;
  send_timeout 300s;
  # Docker can replace the API container while nginx keeps serving the same
  # web process. Resolve the service name through Docker DNS on every cache
  # refresh instead of pinning the API container's startup IP indefinitely.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api_upstream api:8000;

  location /api/ {
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 900s;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
