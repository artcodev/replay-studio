name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: replay_studio_test
          POSTGRES_USER: replay
          POSTGRES_PASSWORD: replay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U replay -d replay_studio_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install -e 'apps/api[test]'
      - name: Upgrade a fresh PostgreSQL database
        run: python -m alembic -c apps/api/alembic.ini upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://replay:replay@127.0.0.1:5432/replay_studio_test
      - run: python -m pytest -q apps/api/tests

  worker-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ball
            requirements: services/ball-worker/requirements-test.txt
            tests: services/ball-worker/tests
          - service: calibration
            requirements: services/calibration-worker/requirements-test.txt
            tests: services/calibration-worker/tests
          - service: identity
            requirements: services/identity-worker/requirements-test.txt
            tests: services/identity-worker/tests
          - service: jersey-ocr
            requirements: services/jersey-ocr-worker/requirements-test.txt
            tests: services/jersey-ocr-worker/tests
          - service: model-validation
            requirements: services/model-validation/requirements-test.txt
            tests: services/model-validation/tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: ${{ matrix.requirements }}
      - run: python -m pip install -r '${{ matrix.requirements }}'
      # Run from the repository root: this is also the regression gate for
      # worker package names colliding with apps/api/app.
      - run: python -m pytest -q '${{ matrix.tests }}'

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  compose-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
